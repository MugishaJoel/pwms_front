<!DOCTYPE html>
<html>
<head>
  <title>WeSmart</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loader" class="loader">
     <div class="spinner"></div>
  </div>
  <div class="holder">
    <div class="phone">
      <h2>💧 WeSmart Water</h2>
      <p>Gura amazi uciye hano</p>
      <input type="number" id="meterNumber" placeholder="Enter Meter Number (nimero ya mubazi)">
      <input type="number" id="amount" placeholder="Enter Amount (amafaranga)">
      <button class="but" onclick="checkMeter()">Continue</button> 
    </div>
    <div class="search">
      <p>Ushaka kureba token uheruka kugura?<br>Shyiramo nimero ya mubazi maze ukande <b>search</b></p>
      <input type="number" id="meterNumberSearch" placeholder="Enter meter number (nimero ya mubazi)" class="token-in">
      <button class="search-button" onclick="getLastToken()">Search</button>
    </div>
  </div>
  <div id="modal" class="modal">
    <div id="content" class="modal-content">
      <h3>Confirm Payment</h3>
      <p id="m_meter"></p>
      <p id="m_user"></p>
      <p id="m_amount"></p>

      <div class="buttons">
        <button class="cancel" onclick="closeModal()">Cancel</button>
        <button class="buy" onclick="buyWater()">Pay</button>
      </div>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
